<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Sibaba Foundation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a 0%, #064e3b 55%, #065f46 100%);
      padding: 24px;
    }

    /* Animated bg blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.15;
      pointer-events: none;
    }
    body::before { width: 600px; height: 600px; background: #10b981; top: -200px; right: -200px; }
    body::after  { width: 500px; height: 500px; background: #3b82f6; bottom: -150px; left: -150px; }

    .login-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 440px;
    }

    .login-card {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.1);
    }

    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .login-logo img {
      height: 68px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
    }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 0 auto 20px;
      display: block;
      width: fit-content;
    }

    .login-card h1 {
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
      color: #0f172a;
      margin-bottom: 6px;
    }
    .login-subtitle {
      text-align: center;
      color: #64748b;
      font-size: 0.88rem;
      margin-bottom: 32px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 0.9rem;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      color: #1e293b;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      font-family: inherit;
    }
    .input-wrap input:focus {
      border-color: #059669;
      box-shadow: 0 0 0 3px rgba(5,150,105,0.12);
      background: #fff;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #065f46 0%, #047857 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.97rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 14px rgba(6,95,70,0.35);
      font-family: inherit;
    }
    .login-btn:hover:not(:disabled) { opacity: 0.9; box-shadow: 0 6px 20px rgba(6,95,70,0.45); }
    .login-btn:active:not(:disabled) { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      display: none;
      align-items: center;
      gap: 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.86rem;
      margin-top: 16px;
      font-weight: 500;
    }
    .error-msg.show { display: flex; }

    .back-link {
      color: rgba(255,255,255,0.65);
      font-size: 0.85rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }

    @media (max-width: 480px) {
      .login-card { padding: 36px 24px 28px; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="images/SIBABA FOUNDATION LOGO@5x.png" alt="Sibaba Foundation" />
      </div>
      <span class="admin-badge"><i class="fas fa-shield-alt"></i> Admin Access Only</span>
      <h1>Welcome Back</h1>
      <p class="login-subtitle">Sign in to manage foundation content</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="admin@example.com" required autocomplete="email" />
          </div>
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
          </div>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> <span id="loginBtnText">Sign In</span>
        </button>
        <div class="error-msg" id="errorMsg">
          <i class="fas fa-exclamation-circle"></i>
          <span id="errorText">Invalid credentials. Please try again.</span>
        </div>
      </form>
    </div>
    <a href="index.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Foundation Site
    </a>
  </div>

  <script type="module">
    import { auth }                            from './firebase.js';
    import { signInWithEmailAndPassword,
             onAuthStateChanged }              from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

    // If already signed in, go straight to admin
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'admin.html';
    });

    const form      = document.getElementById('loginForm');
    const loginBtn  = document.getElementById('loginBtn');
    const btnText   = document.getElementById('loginBtnText');
    const errorMsg  = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      loginBtn.disabled = true;
      btnText.textContent = 'Signing in…';
      errorMsg.classList.remove('show');

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'admin.html';
      } catch (err) {
        const msgs = {
          'auth/invalid-credential':       'Invalid email or password.',
          'auth/user-not-found':           'No account found with that email.',
          'auth/wrong-password':           'Incorrect password.',
          'auth/too-many-requests':        'Too many attempts. Please wait and try again.',
          'auth/network-request-failed':   'Network error. Check your connection.',
        };
        errorText.textContent = msgs[err.code] || 'Sign-in failed. Please try again.';
        errorMsg.classList.add('show');
        loginBtn.disabled = false;
        btnText.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
